# /etc/nginx/sites-available/accounting.symbtech.net
# Appli d'administration Symbtech (SPA statique Vite). Certbot ajoutera le bloc 443.
server {
    listen 80;
    listen [::]:80;
    server_name accounting.symbtech.net;

    root /var/www/accounting.symbtech.net;
    index index.html;

    # SPA : toute route inconnue retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets hashés par Vite : cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/accounting.access.log;
    error_log  /var/log/nginx/accounting.error.log;
}
