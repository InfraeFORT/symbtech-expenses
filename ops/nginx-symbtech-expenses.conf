# /etc/nginx/sites-available/symbtech-expenses
# Vhost dédié, isolé d'e-FORT. proxy_pass vers le process pm2 (port 3002).
server {
    listen 80;
    server_name expenses.symbtech.net;          # <-- adapte au domaine retenu

    # Uploads de justificatifs (multi-pages / PDF). Défaut Nginx = 1M, trop bas.
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;                 # l'OCR peut prendre quelques secondes
    }
}
